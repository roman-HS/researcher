name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      APP_URL: http://localhost:3000
      # Auth and DB modules initialize at import time during `next build`.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci
      BETTER_AUTH_SECRET: ci-build-placeholder-do-not-use-in-production
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check migration safety
        run: pnpm db:check-migrations

      - name: Run quality gate
        run: pnpm check
